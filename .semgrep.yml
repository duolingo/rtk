rules:
  - id: dynamic-command-execution
    patterns:
      - pattern: Command::new($ARG)
      - pattern-not: Command::new("...")
    message: >
      Dynamic shell invocation via Command::new($ARG).
      RTK only executes known CLI tools — use string literals, not variables.
    languages: [rust]
    severity: ERROR

  - id: unsafe-block
    pattern: unsafe { ... }
    message: >
      Unsafe block detected. RTK has no legitimate need for unsafe code.
    languages: [rust]
    severity: ERROR

  - id: ld-preload-manipulation
    pattern-either:
      - pattern: $CMD.env("LD_PRELOAD", ...)
      - pattern: $CMD.env("LD_LIBRARY_PATH", ...)
    message: >
      LD_PRELOAD/LD_LIBRARY_PATH manipulation detected.
      This can hijack shared library loading — forbidden in RTK.
    languages: [rust]
    severity: ERROR

  - id: direct-network-api
    pattern-regex: \b(std::net|core::net|TcpStream|TcpListener|UdpSocket|ToSocketAddrs|lookup_host)\b
    message: >
      Direct network API detected. RTK must not open sockets or resolve hosts;
      network-capable commands may only run when explicitly requested by the user.
    languages: [rust]
    severity: ERROR

  - id: raw-socket-usage
    pattern-either:
      - pattern: TcpStream::$METHOD(...)
      - pattern: UdpSocket::$METHOD(...)
      - pattern: TcpListener::$METHOD(...)
    message: >
      Raw socket usage detected. RTK is a CLI proxy — it must not open network
      connections or include telemetry/call-home behavior.
    languages: [rust]
    severity: ERROR

  - id: http-client-forbidden
    pattern-either:
      - pattern: reqwest::$METHOD(...)
      - pattern: ureq::$METHOD(...)
      - pattern: hyper::$METHOD(...)
      - pattern: isahc::$METHOD(...)
      - pattern: surf::$METHOD(...)
      - pattern: attohttpc::$METHOD(...)
    message: >
      HTTP client usage is forbidden in RTK. The binary must not include an
      in-process network client or any telemetry/call-home path.
    languages: [rust]
    severity: ERROR

  - id: network-helper-process
    pattern-either:
      - pattern: Command::new("curl")
      - pattern: Command::new("wget")
      - pattern: Command::new("nc")
      - pattern: Command::new("netcat")
      - pattern: Command::new("ncat")
      - pattern: Command::new("socat")
      - pattern: Command::new("ssh")
      - pattern: Command::new("scp")
      - pattern: Command::new("sftp")
      - pattern: resolved_command("curl")
      - pattern: resolved_command("wget")
      - pattern: resolved_command("nc")
      - pattern: resolved_command("netcat")
      - pattern: resolved_command("ncat")
      - pattern: resolved_command("socat")
      - pattern: resolved_command("ssh")
      - pattern: resolved_command("scp")
      - pattern: resolved_command("sftp")
    paths:
      exclude:
        - src/cmds/cloud/curl_cmd.rs
        - src/cmds/cloud/wget_cmd.rs
    message: >
      Network helper process detected outside a dedicated user-requested proxy.
      Hidden curl/wget/nc/ssh-style calls are call-home footguns.
    languages: [rust]
    severity: ERROR

  - id: hardcoded-endpoint-child-process-arg
    pattern-regex: \.(arg|args)\([^;\n]*(https?://|api\.)
    message: >
      Hard-coded endpoint passed to a child process. RTK must not embed outbound
      destinations; only user-provided command arguments may control network I/O.
    languages: [rust]
    severity: ERROR

  # ── WARNING rules (non-blocking, flag for review) ──

  - id: path-env-manipulation
    pattern-either:
      - pattern: $CMD.env("PATH", ...)
      - pattern: std::env::set_var("PATH", ...)
      - pattern: env::set_var("PATH", ...)
    message: >
      PATH environment variable manipulation detected.
      Hijacking PATH can redirect command resolution to attacker-controlled binaries.
    languages: [rust]
    severity: WARNING

  - id: sensitive-path-reference
    pattern-regex: \.(ssh|bashrc|zshrc|bash_profile|profile)|authorized_keys|/etc/passwd|/etc/shadow
    message: >
      Reference to sensitive system path detected.
      RTK filters should not access dotfiles, SSH keys, or system credential files.
    languages: [rust]
    severity: WARNING

  - id: filesystem-deletion
    pattern-either:
      - pattern: fs::remove_file(...)
      - pattern: fs::remove_dir_all(...)
      - pattern: std::fs::remove_file(...)
      - pattern: std::fs::remove_dir_all(...)
    message: >
      File/directory deletion detected. Expected in hooks/init cleanup,
      surprising in a filter module. Verify intent.
    languages: [rust]
    severity: WARNING
